spring:
  application:
    name: platformax-backend

  datasource:
    url: jdbc:h2:mem:platformax;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

security:
  jwt:
    # Override with a strong random secret via SECURITY_JWT_SECRET env var in production
    secret: "changeme-at-least-32-characters-long-secret-key-here"
    ttlMinutes: 60

logging:
  level:
    org.hibernate.SQL: debug